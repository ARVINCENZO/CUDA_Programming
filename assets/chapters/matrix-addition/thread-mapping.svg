<text x="1285" y="285" class="b">Thread</text>
<text x="1285" y="325" class="c">(threadIdx.x=1)</text>
<text x="1285" y="360" class="c">(threadIdx.y=2)</text>
<text x="1285" y="415" class="b">Maps to</text>
<text x="1285" y="455" class="c">(row=2,col=1)</text>

<rect x="980" y="560" width="520" height="120" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
<text x="1010" y="605" class="c">index = row × width + column</text>
<text x="1010" y="640" class="c">index = 2 × 4 + 1 = 9</text>

<line x1="40" y1="830" x2="1560" y2="830" stroke="#30363D"/>
<text x="800" y="868" text-anchor="middle" class="s">
Each CUDA thread computes one matrix element by using its thread coordinates to determine the row, column, and memory index.
</text>
