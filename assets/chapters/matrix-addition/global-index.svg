<text x="540" y="680" class="f">index = row × width + column</text>
<text x="540" y="715" class="f">index = 2 × 4 + 3</text>
<text x="540" y="750" class="f">index = 11</text>

<line x1="50" y1="825" x2="1550" y2="825" stroke="#30363D"/>
<text x="800" y="865" text-anchor="middle" class="s">
