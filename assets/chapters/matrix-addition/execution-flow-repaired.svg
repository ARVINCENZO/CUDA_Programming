.body{font:600 16px Arial;fill:#F0F6FC}
.foot{font:18px Arial;fill:#8B949E}
</style>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
<path d="M0,0 L10,4 L0,8 Z" fill="#58A6FF"/>
</marker>
</defs>
<rect width="100%" height="100%" fill="#0D1117"/>
<text x="60" y="60" class="title">CUDA Programming • Chapter 2</text>
<text x="60" y="95" class="sub">Figure 6 — CUDA Matrix Addition Execution Flow</text>
<rect x="40" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#76B900" stroke-width="3"/><text x="130.0" y="288" text-anchor="middle" class="head">Host</text><text x="130.0" y="330" text-anchor="middle" class="body">Initialize</text><text x="130.0" y="352" text-anchor="middle" class="body">Matrices</text><line x1="220" y1="325.0" x2="247" y2="325.0" stroke="#58A6FF" stroke-width="4" marker-end="url(#arrow)"/><rect x="255" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#58A6FF" stroke-width="3"/><text x="345.0" y="288" text-anchor="middle" class="head">cudaMalloc</text><text x="345.0" y="330" text-anchor="middle" class="body">Allocate</text><text x="345.0" y="352" text-anchor="middle" class="body">GPU Memory</text><line x1="435" y1="325.0" x2="462" y2="325.0" stroke="#58A6FF" stroke-width="4" marker-end="url(#arrow)"/><rect x="470" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#58A6FF" stroke-width="3"/><text x="560.0" y="288" text-anchor="middle" class="head">cudaMemcpy</text><text x="560.0" y="310" text-anchor="middle" class="head">(H→D)</text><text x="560.0" y="352" text-anchor="middle" class="body">Copy</text><text x="560.0" y="374" text-anchor="middle" class="body">Inputs</text><line x1="650" y1="325.0" x2="677" y2="325.0" stroke="#58A6FF" stroke-width="4" marker-end="url(#arrow)"/><rect x="685" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#76B900" stroke-width="3"/><text x="775.0" y="288" text-anchor="middle" class="head">Kernel</text><text x="775.0" y="330" text-anchor="middle" class="body">Launch</text><text x="775.0" y="352" text-anchor="middle" class="body">&lt;&lt;&lt;grid,block&gt;&gt;&gt;</text><line x1="865" y1="325.0" x2="892" y2="325.0" stroke="#58A6FF" stroke-width="4" marker-end="url(#arrow)"/><rect x="900" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#76B900" stroke-width="3"/><text x="990.0" y="288" text-anchor="middle" class="head">GPU</text><text x="990.0" y="330" text-anchor="middle" class="body">Parallel</text><text x="990.0" y="352" text-anchor="middle" class="body">Execution</text><line x1="1080" y1="325.0" x2="1107" y2="325.0" stroke="#58A6FF" stroke-width="4" marker-end="url(#arrow)"/><rect x="1115" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#58A6FF" stroke-width="3"/><text x="1205.0" y="288" text-anchor="middle" class="head">cudaMemcpy</text><text x="1205.0" y="310" text-anchor="middle" class="head">(D→H)</text><text x="1205.0" y="352" text-anchor="middle" class="body">Copy</text><text x="1205.0" y="374" text-anchor="middle" class="body">Result</text><line x1="1295" y1="325.0" x2="1322" y2="325.0" stroke="#58A6FF" stroke-width="4" marker-end="url(#arrow)"/><rect x="1330" y="250" width="180" height="150" rx="16" fill="#161B22" stroke="#76B900" stroke-width="3"/><text x="1420.0" y="288" text-anchor="middle" class="head">Verify</text><text x="1420.0" y="330" text-anchor="middle" class="body">Check</text><text x="1420.0" y="352" text-anchor="middle" class="body">Output</text>
<rect x="180" y="500" width="1240" height="180" rx="18" fill="#161B22" stroke="#30363D" stroke-width="2"/>
<text x="800" y="545" text-anchor="middle" class="head">Overall Execution Pipeline</text>
<text x="800" y="590" text-anchor="middle" class="body">CPU initializes matrices and allocates GPU memory.</text>
<text x="800" y="625" text-anchor="middle" class="body">Input matrices are copied to the GPU, where thousands of CUDA threads execute the kernel.</text>
<text x="800" y="660" text-anchor="middle" class="body">The resulting matrix is copied back to the CPU for verification.</text>

<line x1="60" y1="820" x2="1540" y2="820" stroke="#30363D"/>
<text x="800" y="860" text-anchor="middle" class="foot">Host → Memory Allocation → Data Transfer → Kernel Launch → Parallel Execution → Result Copy → Verification</text>
</svg>
